
server:
  port: 8080
  read_timeout: 5s
  write_timeout: 10s

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: subscriptions
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 5

log:
  level: info   # debug, info, warn, error
  format: json  # json or text

crypto:
  enabled: false  # no-op encryption by default