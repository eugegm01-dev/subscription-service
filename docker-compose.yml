version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-subscriptions}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      APP_DATABASE_HOST: postgres
      APP_DATABASE_PORT: 5432
      APP_DATABASE_USER: ${DB_USER:-postgres}
      APP_DATABASE_PASSWORD: ${DB_PASSWORD:-postgres}
      APP_DATABASE_DBNAME: ${DB_NAME:-subscriptions}
      APP_LOG_LEVEL: debug
    volumes:
      - ./internal/config/config.yaml:/root/internal/config/config.yaml
    command: ["sh", "-c", "sleep 2 && ./server"]

volumes:
  pgdata: